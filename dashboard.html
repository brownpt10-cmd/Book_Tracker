<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dark Skies Consulting — Chief-of-Staff Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root {
    --ink: #0A0A0C;
    --offwhite: #F5F6F7;
    /* Reading-copy color: deliberately dimmer than the brand wordmark's #F5F6F7.
       Pure-white-on-near-black causes visible "bloom"/halo and eye strain on
       screens — this is body-text color only, never the logo. */
    --text: #DCDEE2;
    --subtext: #B9BCC2;
    --accent: oklch(0.55 0.06 250);
    --accent-dim: oklch(0.32 0.045 250);
    --panel-bg: #16171C;
    --panel-border: rgba(245, 246, 247, 0.08);
    --sans: 'Titillium Web', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--ink); }
  body {
    margin: 0; font-family: var(--sans); color: var(--text); line-height: 1.6;
    position: relative; min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 8% 12%, rgba(245,246,247,.55), transparent 60%),
      radial-gradient(1px 1px at 22% 68%, rgba(245,246,247,.35), transparent 60%),
      radial-gradient(1.5px 1.5px at 38% 30%, rgba(245,246,247,.5), transparent 60%),
      radial-gradient(1px 1px at 54% 82%, rgba(245,246,247,.3), transparent 60%),
      radial-gradient(1px 1px at 67% 18%, rgba(245,246,247,.45), transparent 60%),
      radial-gradient(1.5px 1.5px at 81% 55%, rgba(245,246,247,.4), transparent 60%),
      radial-gradient(1px 1px at 93% 88%, rgba(245,246,247,.3), transparent 60%),
      radial-gradient(1px 1px at 15% 92%, rgba(245,246,247,.35), transparent 60%),
      radial-gradient(1px 1px at 74% 40%, rgba(245,246,247,.25), transparent 60%);
    background-repeat: repeat; background-size: 480px 480px;
  }
  main, .topbar { position: relative; z-index: 1; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 28px; border-bottom: 1px solid var(--panel-border);
    position: sticky; top: 0; background: rgba(10,10,12,0.88); backdrop-filter: blur(8px);
    z-index: 20;
  }
  .topbar-logo-link { text-decoration: none; display: inline-flex; align-items: center; }

  /* Logo lockup — rings behind stacked initials/divider/fullname, per the brand
     spec. --topbar sizes the whole composition to ~50% of the old separate
     hero banner (rings were 380px there) so it fits compactly upper-left. */
  .dsc-logo { position: relative; display: flex; flex-direction: column; align-items: center; }
  .dsc-rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -54%);
    width: 380px; max-width: 90vw; height: auto; }
  .dsc-rings ellipse { fill: none; stroke: var(--accent-dim); }
  .dsc-rings .ring-outer { stroke-width: 1.5; opacity: 0.9; }
  .dsc-rings .ring-inner { stroke-width: 1; opacity: 0.55; }
  .dsc-wordmark { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }
  .dsc-initials { font-weight: 600; font-size: 64px; letter-spacing: .08em; color: var(--offwhite); line-height: 1; }
  .dsc-divider { width: 220px; max-width: 60vw; height: 2px; background: var(--accent); margin: 16px 0; }
  .dsc-fullname { font-weight: 500; font-size: 14px; letter-spacing: .42em; text-transform: uppercase;
    color: var(--subtext); text-align: center; }

  .dsc-logo--topbar { width: 190px; padding: 14px 0 10px; }
  .dsc-logo--topbar .dsc-rings { width: 190px; }
  .dsc-logo--topbar .dsc-initials { font-size: 32px; }
  .dsc-logo--topbar .dsc-divider { width: 110px; height: 1px; margin: 8px 0; }
  .dsc-logo--topbar .dsc-fullname { font-size: 9px; letter-spacing: .3em; }

  nav.tabs { display: flex; gap: 4px; background: var(--panel-bg); border: 1px solid var(--panel-border);
    border-radius: 999px; padding: 4px; }
  nav.tabs a {
    background: none; border: none; color: var(--subtext); font-family: var(--sans);
    padding: 8px 18px; border-radius: 999px; cursor: pointer; font-size: 12px;
    letter-spacing: .12em; text-transform: uppercase; font-weight: 600;
    text-decoration: none; display: inline-block;
  }
  nav.tabs a.active { background: var(--accent); color: #05070a; }
  nav.tabs a:not(.active):hover { color: var(--offwhite); }

  main { max-width: 1400px; margin: 0 auto; padding: 22px 24px 60px; }

  /* Mobile-first: single stacked column in original document order. */
  .columns-desktop { display: none; }
  .stack-mobile { display: block; }

  /* Desktop: explicit 3-column layout, panels pre-distributed at build time
     (greedy height balance) rather than relying on CSS column-count, which
     forces one column to run long when a single panel is much taller than
     the rest and leaves the other columns with a big blank gap. */
  @media (min-width: 1080px) {
    .stack-mobile { display: none; }
    .columns-desktop { display: flex; gap: 22px; align-items: flex-start; }
    .columns-desktop .col { flex: 1 1 0; min-width: 0; }
  }

  .panel {
    background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 14px;
    padding: 26px 28px; margin-bottom: 22px; position: relative; overflow: hidden;
  }
  .panel::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent 70%);
  }

  h1 { font-size: 15px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; margin: 0; color: var(--offwhite); }
  h2 {
    font-size: 13px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
    color: var(--offwhite); margin: 0 0 18px; padding-bottom: 12px;
    border-bottom: 1px solid var(--panel-border); display: flex; align-items: center; gap: 10px;
  }
  .panel:not(:first-child) h2 { margin-top: 0; }
  h3 { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin: 18px 0 8px; }
  p { color: var(--text); font-size: 14.5px; font-weight: 400; line-height: 1.65; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--offwhite); font-weight: 600; }
  em { color: var(--subtext); font-style: italic; }
  a { color: var(--accent); }

  .table-wrap { overflow-x: auto; margin: 4px 0 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--panel-border); }
  th { color: var(--subtext); font-weight: 600; text-transform: uppercase; font-size: 10px;
    letter-spacing: .1em; font-family: var(--mono); }
  td { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(245,246,247,0.03); }

  code { background: rgba(245,246,247,0.08); color: var(--text); padding: 2px 6px; border-radius: 4px;
    font-family: var(--mono); font-size: 90%; }
  ul { padding-left: 20px; margin: 8px 0; }
  li { margin-bottom: 10px; font-size: 14.5px; font-weight: 400; line-height: 1.65; color: var(--text); }
  li:last-child { margin-bottom: 0; }
  hr { display: none; }

  .status { display: inline-block; font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; margin-right: 6px; }
  .status--active { color: var(--accent); background: rgba(110, 150, 200, 0.14); border: 1px solid var(--accent-dim); }
  .status--dormant { color: var(--subtext); background: rgba(185,188,194,0.08); border: 1px solid var(--panel-border); }
  .status--archived { color: #6a6d74; background: rgba(106,109,116,0.08); border: 1px solid var(--panel-border); }

  /* Registry cards — category panels stack full width; cards flow responsively inside. */
  .reg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .reg-card { border: 1px solid var(--panel-border); border-radius: 12px; padding: 14px 15px;
    background: rgba(245,246,247,0.015); display: flex; flex-direction: column; }
  .reg-card--ref { border-style: dashed; }
  .reg-card--paused { opacity: 0.68; }
  .reg-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .reg-card-title { font-weight: 600; font-size: 14px; color: var(--offwhite); line-height: 1.3; }
  .reg-sys { font-family: var(--mono); font-size: 9.5px; letter-spacing: .07em; text-transform: uppercase;
    color: var(--subtext); border: 1px solid var(--panel-border); border-radius: 999px; padding: 2px 8px; white-space: nowrap; }
  .reg-desc { font-size: 13px; color: var(--text); opacity: 0.78; line-height: 1.5; margin-bottom: 12px; flex: 1; }
  .reg-cad { align-self: flex-start; font-family: var(--mono); font-size: 11px; padding: 3px 10px; border-radius: 999px; }
  .reg-cad--scheduled { color: var(--accent); background: rgba(110,150,200,0.14); border: 1px solid var(--accent-dim); }
  .reg-cad--asneeded { color: var(--subtext); background: rgba(245,246,247,0.05); border: 1px solid var(--panel-border); }
  .reg-cad--paused { color: var(--subtext); background: rgba(245,246,247,0.06); border: 1px solid var(--panel-border); }
  .reg-cad--planned { color: var(--subtext); background: none; border: 1px dashed var(--accent-dim); }

  .footer-note { color: var(--subtext); font-family: var(--mono); font-size: 11px; letter-spacing: .04em;
    margin-top: 30px; text-align: center; opacity: .7; }

  /* Phone-specific tightening (Digest is the page most often checked on a phone). */
  @media (max-width: 600px) {
    .dsc-logo--topbar { width: 120px; padding: 8px 0; }
    .dsc-logo--topbar .dsc-rings { width: 120px; }
    .dsc-logo--topbar .dsc-initials { font-size: 22px; }
    .dsc-logo--topbar .dsc-divider { display: none; }
    .dsc-logo--topbar .dsc-fullname { display: none; }
    .panel { padding: 18px 16px; margin-bottom: 16px; }
    main { padding: 14px 14px 40px; }
    h2 { font-size: 12px; letter-spacing: .14em; }
    table, th, td { font-size: 11.5px; }
    th, td { padding: 8px 8px; }
    nav.tabs { gap: 2px; padding: 3px; }
    nav.tabs a { padding: 7px 10px; font-size: 10px; letter-spacing: .06em; white-space: nowrap; }
  }

  .landing-links { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; margin-top: 30px; }
  .landing-links a {
    display: block; min-width: 200px; text-align: center; text-decoration: none;
    background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 14px;
    padding: 22px 30px; color: var(--offwhite); font-family: var(--mono); font-size: 12px;
    letter-spacing: .14em; text-transform: uppercase; font-weight: 600; position: relative; overflow: hidden;
  }
  .landing-links a::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent 70%);
  }
  .landing-links a small { display: block; margin-top: 6px; color: var(--subtext); font-size: 10px; letter-spacing: .08em; text-transform: none; font-weight: 400; }

</style>
</head>
<body>
<div style="padding-top: 60px; display: flex; flex-direction: column; align-items: center;">
  <div class="dsc-logo dsc-logo--topbar">
  
<svg class="dsc-rings" viewBox="0 0 400 200" aria-hidden="true">
  <ellipse cx="200" cy="100" rx="162" ry="60" transform="rotate(-18 200 100)" class="ring-outer"/>
  <ellipse cx="200" cy="100" rx="132" ry="45" transform="rotate(-18 200 100)" class="ring-inner"/>
</svg>

  <div class="dsc-wordmark">
    <span class="dsc-initials">DSC</span>
    <span class="dsc-divider"></span>
    <span class="dsc-fullname">Dark Skies Consulting</span>
  </div>
</div>
  <div class="landing-links">
    <a href="digest.html">Digest<small>Today's pull</small></a>
    <a href="registry.html">Registry<small>What exists</small></a>
    <a href="stock-price.html">Stock-Price<small>/stock-price &amp; /stock-trim runs</small></a>
  </div>
  <div class="footer-note">Rendered 2026-07-11 16:36</div>
</div>
</body>
</html>
